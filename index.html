<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مشروع البصرة العقاري</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header class="main-header">
        <div class="logo">🏢 مشروع البصرة العقاري</div>
    </header>

    <section class="stats-section">
        <div class="stat-box">
            <h3 id="total-listings">0</h3>
            <p>إجمالي العقارات المتاحة</p>
        </div>
        <div class="stat-box">
            <h3 id="total-offices">0</h3>
            <p>مكاتب الدلالية المسجلة</p>
        </div>
    </section>

    <main class="container">
        <h2 class="section-title">✨ العقارات الحالية المتاحة في البصرة</h2>
        <div id="listings-container" class="grid-container">
            <p class="loading-msg">جاري تحميل العقارات الحية من قاعدة البيانات...</p>
        </div>

        <h2 class="section-title">🏢 مكاتب الدلالية والعقارات الشريكة</h2>
        <div id="offices-container" class="grid-container-offices">
            <p class="loading-msg">جاري تحميل المكاتب...</p>
        </div>
    </main>

    <script src="js/app.js"></script>
</body>
</html>
