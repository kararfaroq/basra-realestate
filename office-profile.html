<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>بروفايل المكتب العقاري - دليل البصرة العقاري</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');
    *{margin:0;padding:0;box-sizing:border-box}
    :root{--gold:#C9A84C; --gold-light:#E8C96A; --navy:#0A1628; --navy-mid:#1A3A5C; --navy-light:#2A5080; --text-on-dark:#F5F0E8; --text-muted:#8BA0B8; --success:#4CAF7D;}
    body{font-family:'Cairo',sans-serif;background:var(--navy);color:var(--text-on-dark);direction:rtl;padding:2rem 1rem;}
    .container{max-width:900px; margin:0 auto;}
    .profile-card {background:var(--navy-mid); border:1px solid rgba(201,168,76,0.25); border-radius:24px; padding:3rem 2rem; text-align:center; box-shadow:0 15px 40px rgba(0,0,0,0.4); position:relative; overflow:hidden;}
    .profile-card::before {content:''; position:absolute; top:0; left:0; width:100%; height:8px; background: linear-gradient(90deg, var(--gold), var(--gold-light));}
    .profile-logo {width:130px; height:130px; border-radius:50%; background:rgba(201,168,76,0.1); border:3px solid var(--gold); margin:0 auto 1.5rem; display:flex; align-items:center; justify-content:center; font-size:48px; font-weight:900; color:var(--gold); object-fit: cover;}
    .profile-name { font-size:1.8rem; font-weight:900; color:#fff; margin-bottom:0.5rem; }
    .profile-tagline { font-size:14px; color:var(--gold); font-weight:600; margin-bottom:1.5rem; display:inline-block; background:rgba(201,168,76,0.08); padding:4px 16px; border-radius:100px; }
    .profile-desc {font-size:15px; color:var(--text-muted); line-height:1.8; max-width:650px; margin:0 auto 2rem; padding:1.5rem; background:rgba(255,255,255,0.02); border-radius:14px; border:1px solid rgba(255,255,255,0.04);}
    .info-grid {display:grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap:1.2rem; margin-bottom:2.5rem;}
    .info-item {background: rgba(10, 22, 40, 0.5); border: 1px solid rgba(255,255,255,0.05); padding:1.2rem; border-radius:14px; display:flex; align-items:center; gap:12px; text-align:right;}
    .info-icon {width:44px; height:44px; background:rgba(201,168,76,0.1); border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:20px; color:var(--gold);}
    .info-label { font-size:11px; color:var(--text-muted); block:inline; }
    .info-val { font-size:14px; font-weight:700; color:#fff; margin-top:2px; }
    .btn-call {display:inline-flex; align-items:center; gap:10px; background:var(--gold); color:var(--navy); padding:14px 40px; border-radius:12px; text-decoration:none; font-weight:700; font-size:16px; transition:0.2s; box-shadow:0 5px 15px rgba(201,168,76,0.2);}
    .btn-call:hover { background:var(--gold-light); transform:translateY(-2px); }
    .btn-back {display:inline-block; margin-top:2rem; color:var(--text-muted); text-decoration:none; font-size:14px; transition:0.2s;}
    
    /* تصميم شبكة العقارات داخل البروفايل */
    .listing-grid {display:grid; grid-template-columns:repeat(auto-fill,minmax(250px,1fr)); gap:1.2rem; text-align: right;}
    .listing-card {background:var(--navy); border:1px solid rgba(201,168,76,0.12); border-radius:14px; overflow:hidden; transition:all .25s;}
    .card-img {height:120px; background:var(--navy-light); display:flex; align-items:center; justify-content:center; font-size:2.5rem; position:relative;}
    .card-badge {position:absolute; top:10px; right:10px; background:rgba(201,168,76,0.9); color:var(--navy); padding:4px 12px; border-radius:100px; font-size:11px; font-weight:700;}
    .card-body {padding:1rem;}
    .card-price {font-size:1.2rem; font-weight:900; color:var(--gold); margin-bottom:4px;}
    .card-title {font-size:13px; font-weight:600; color:var(--text-on-dark);}
  </style>
</head>
<body>

<div class="container">
  <div class="profile-card">
    <div id="officeLogoContainer"><div id="officeLogoText" class="profile-logo">🏢</div><img id="officeLogoImg" class="profile-logo" src="" alt="الشعار" style="display:none;"></div>
    <h1 id="officeNameDisplay" class="profile-name">جاري التحميل...</h1>
    <span id="officeAreaDisplay" class="profile-tagline">الموقع: -</span>
    <p id="officeDescDisplay" class="profile-desc">لم يقم صاحب المكتب بكتابة نبذة تعريفية حتى الآن.</p>
    
    <div class="info-grid">
      <div class="info-item"><div class="info-icon"><i class="ti ti-map-pin"></i></div><div><div class="info-label">المنطقة المتخصص بها</div><div id="gridAreaVal" class="info-val">-</div></div></div>
      <div class="info-item"><div class="info-icon"><i class="ti ti-phone"></i></div><div><div class="info-label">رقم هاتف التواصل</div><div id="gridPhoneVal" class="info-val">غير مدرج حالياً</div></div></div>
      <div class="info-item"><div class="info-icon"><i class="ti ti-shield-check"></i></div><div><div class="info-label">حالة التوثيق</div><div class="info-val" style="color:var(--success);">🟢 مكتب معتمد</div></div></div>
    </div>
    
    <a id="callActionBtn" href="#" class="btn-call"><i class="ti ti-phone-call"></i> اتصل بالمكتب الآن</a>
    
    <div style="margin-top: 3rem; text-align: right; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 2rem;">
      <h3 style="color: var(--gold); margin-bottom: 1.5rem; font-size: 1.2rem;"><i class="ti ti-home"></i> العقارات المتوفرة لدى هذا المكتب:</h3>
      <div class="listing-grid" id="officeListingsGrid"></div>
    </div>

    <br><a href="index.html" class="btn-back">← العودة للمعرض العقاري الرئيسي</a>
  </div>
</div>

<script>
  const STORAGE_KEY = 'basra_data_v3';
  document.addEventListener('DOMContentLoaded', () => {
    const urlParams = new URLSearchParams(window.location.search);
    const officeId = urlParams.get('id') || "1";
    let offices = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
    const currentOffice = offices.find(o => o.id === officeId);
    
    if (currentOffice) {
      document.getElementById('officeNameDisplay').textContent = currentOffice.name;
      document.title = `${currentOffice.name} - دليل البصرة`;
      document.getElementById('officeAreaDisplay').textContent = `منطقة العمل والتخصص: ${currentOffice.area}`;
      document.getElementById('gridAreaVal').textContent = currentOffice.area;
      if (currentOffice.description) document.getElementById('officeDescDisplay').textContent = currentOffice.description;
      if (currentOffice.phone) { document.getElementById('gridPhoneVal').textContent = currentOffice.phone; document.getElementById('callActionBtn').href = `tel:${currentOffice.phone}`; } else { document.getElementById('callActionBtn').style.display = 'none'; }
      if (currentOffice.logo) { document.getElementById('officeLogoImg').src = currentOffice.logo; document.getElementById('officeLogoImg').style.display = 'flex'; document.getElementById('officeLogoText').style.display = 'none'; } else { document.getElementById('officeLogoText').textContent = currentOffice.name.charAt(0); }
      
      // جلب وعرض عقارات هذا المكتب تحديداً
      const grid = document.getElementById('officeListingsGrid');
      if(currentOffice.listings && currentOffice.listings.length > 0) {
        grid.innerHTML = currentOffice.listings.map(l => `
          <div class="listing-card">
            <div class="card-img">${l.icon}<div class="card-badge">${l.action}</div></div>
            <div class="card-body"><div class="card-price">${l.price}</div><div class="card-title">${l.type} في ${l.district}</div></div>
          </div>
        `).join('');
      } else {
        grid.innerHTML = "<p style='color:var(--text-muted); grid-column:1/-1; text-align:center;'>لا توجد عقارات منشورة حالياً لهذا المكتب.</p>";
      }
    } else {
      document.getElementById('officeNameDisplay').textContent = "المكتب غير موجود ⚠️";
      document.getElementById('callActionBtn').style.display = 'none';
    }
  });
</script>
</body>
</html>
